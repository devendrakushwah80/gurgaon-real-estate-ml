[theme]
base = "dark"
primaryColor = "#9CA3AF"
backgroundColor = "#0B0F14"
secondaryBackgroundColor = "#111827"
textColor = "#F3F4F6"
font = "sans serif"

[server]
headless = true
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
